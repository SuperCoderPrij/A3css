<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squid Game Hero</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <div class="backdrop">
      <span class="backdrop-word right">GAME</span>
      <span class="backdrop-word bottom">GAME</span>
    </div>

    <header class="topbar">
      <div class="brand">
        <img src="squid_gamelogo.png" alt="Squid Game" class="brand-image">
      </div>

      <nav class="nav">
        <a href="#">About</a>
        <a href="#" class="active">Watch now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </nav>

      <div class="menu" aria-label="menu">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>

    <section class="hero">
      <div class="hero-copy">
        <div class="title-group">
          <div class="mini-sigil circle">○</div>
          <h1 class="hero-logo">
            <img src="squid_gamelogo.png" alt="Squid Game" class="hero-logo-image">
          </h1>
          <div class="mini-sigil star">✦</div>
          <div class="mini-sigil diamond">◆</div>
        </div>

        <p class="meta">
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
          Season 1: 9 Episodes
        </p>

        <div class="actions">
          <a href="#" class="btn primary">
            <span class="play-icon"></span>
            Play Now
          </a>
          <a href="#" class="btn secondary">
            <span class="caret"></span>
            Watch Trailer
          </a>
        </div>
      </div>

      <div class="scroll-indicator">
        <span>SCROLL</span>
        <i></i>
      </div>

      <div class="socials">
        <a href="#">♡</a>
        <a href="#">◎</a>
        <a href="#">f</a>
      </div>

      <div class="hero-figure" aria-hidden="true">
        <img
          src="squid_game_PNG67.png"
          alt=""
          class="hero-image"
        >
      </div>
    </section>

    <section class="thumbs">
      <article class="thumb thumb-1">
        <img src="3guards.png" alt="" class="thumb-image thumb-image-first">
        <button class="thumb-play" aria-label="play"></button>
      </article>

      <article class="thumb thumb-2">
        <img src="squid_game_card.png" alt="" class="thumb-image thumb-image-card">
        <button class="thumb-play" aria-label="play"></button>
      </article>

      <article class="thumb thumb-3">
        <img src="master.png" alt="" class="thumb-image thumb-image-master">
        <button class="thumb-play" aria-label="play"></button>
      </article>
    </section>
  </main>
</body>
</html>
